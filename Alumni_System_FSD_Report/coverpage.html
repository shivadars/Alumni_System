<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni System Project Report Cover</title>
    <style>
        /* Basic reset */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* The A4 Paper Canvas */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: #ffffff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            color: #000000;
        }

        /* Top Padding Container - standard A4 Margins (~20mm) */
        .content-wrapper {
            padding: 25mm 20mm 20mm 20mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        /* Header Text */
        .header-text {
            text-align: center;
            font-size: 16pt; 
            line-height: 1.6;
            color: #000000; 
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            font-weight: 700; 
        }

        /* College Logo Tag */
        .college-logo {
            width: 115px;
            height: auto;
            max-height: 115px;
            margin-bottom: 30px;
            object-fit: contain;
        }

        /* Project Titles */
        .report-type {
            font-size: 15pt;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600; 
        }

        .project-name {
            text-align: center;
            font-size: 34pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .project-subtitle {
            display: block;
            font-size: 17pt;
            font-weight: 600; 
            color: #444; 
            letter-spacing: 1px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Student Details Table */
        .student-details {
            font-size: 14pt;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 35px;
        }

        .student-details td {
            padding: 8px 12px;
            vertical-align: middle;
        }

        .col-label {
            text-align: left;
            width: 200px;
            font-weight: 700; 
            color: #000;
        }

        .col-colon {
            text-align: center;
            width: 20px;
            font-weight: 700;
            color: #000;
        }

        .col-value {
            text-align: left;
            color: #111;
            font-weight: 600; 
        }

        /* Centered Image Section for Usable Area (~16.5cm wide) */
        .centered-image-container {
            width: 165mm; /* perfectly fits the 15-17cm usable width margin */
            flex-grow: 1; /* stretches to fill remaining vertical space */
            max-height: 90mm; /* caps the height slightly */
            margin-top: auto;
            border-radius: 8px; /* sharp subtle rounding */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .centered-cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%; /* frames the top/middle of the campus nicely */
        }

        /* =========================================
           BULLETPROOF PRINT SETTINGS
           ========================================= */
        @page {
            size: A4;
            margin: 0; /* Forces the browser to drop its default borders */
        }

        @media print {
            body { 
                background: none; 
                display: block; 
            }
            .a4-page { 
                box-shadow: none; 
                width: 210mm;
                height: 297mm;
                margin: 0;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <div class="content-wrapper">
            <div class="header-text">
                DEPARTMENT OF COMPUTER APPLICATIONS<br>
                RAJAGIRI COLLEGE OF SOCIAL SCIENCES<br>
                (AUTONOMOUS)<br>
                KALAMASSERY
            </div>

            <img src="RCSS.png" alt="Rajagiri College Logo" class="college-logo" onerror="this.style.display='none'">

            <div class="report-type">FSD Project Report</div>
            
            <div class="project-name">
                Alumni System
                <span class="project-subtitle">Management & Community Platform</span>
            </div>

            <table class="student-details">
                <tr>
                    <td class="col-label">Done by</td>
                    <td class="col-colon">:</td>
                    <td class="col-value">U Shivadarsh</td>
                </tr>
                <tr>
                    <td class="col-label">Register No.</td>
                    <td class="col-colon">:</td>
                    <td class="col-value">24118026</td>
                </tr>
                <tr>
                    <td class="col-label">Under the guidance of</td>
                    <td class="col-colon">:</td>
                    <td class="col-value">Mr Ajay Antony Joseph</td>
                </tr>
                <tr>
                    <td class="col-label">Batch</td>
                    <td class="col-colon">:</td>
                    <td class="col-value">2024-2028</td>
                </tr>
            </table>

            <!-- Safe Image container fitting the 16.5cm usable width constraint -->
            <div class="centered-image-container">
                <img src="cover_image.png" alt="University Campus Network" class="centered-cover-image" onerror="this.style.display='none'">
            </div>
        </div>
    </div>

</body>
</html>
