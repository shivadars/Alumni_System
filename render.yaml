services:
  - type: web
    name: alumni-system
    env: php
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "php artisan serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromContext: APP_KEY
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: alumni-db
          property: connectionString
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
    disk:
      name: storage-disk
      mountPath: /var/www/html/storage/app/public
      sizeGB: 1

databases:
  - name: alumni-db
    plan: free
    databaseName: alumni_system
    user: admin
