services:
  - type: web
    name: alumni-system
    env: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:9NRfqUONUovXfRRXoGvi68Xbd4wVbK/1e9TwtJvw01Y=
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: alumni-db
          property: connectionString
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database

databases:
  - name: alumni-db
    plan: free
    databaseName: alumni_system
    user: admin
