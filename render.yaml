services:
  - type: web
    name: alumni-system
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "php artisan serve --host 0.0.0.0 --port $PORT"
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database

databases:
  - name: alumni-db
    plan: free
    databaseName: alumni_system
    user: admin
